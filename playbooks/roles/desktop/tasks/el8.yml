---
- name: Desktop | Install "Server with GUI" package group
  vars:
    package_name:
      - "@Server with GUI"
    package_state: present
  include_role:
    name: safe_yum

- name: Desktop | Remove tigervnc-server-minimal
  ansible.builtin.package:
    name: tigervnc-server-minimal
    state: absent

- name: Desktop | Install TurboVNC RPMs
  vars:
    package_name:
      - https://github.com/TurboVNC/turbovnc/releases/download/3.3/turbovnc-3.3.x86_64.rpm
      - https://github.com/TurboVNC/turbovnc/releases/download/3.3/turbovnc-debuginfo-3.3.x86_64.rpm
    package_state: present
    disable_gpg_check_var: true
  include_role:
    name: safe_yum

- name: Desktop | Install python3-websockify
  vars:
    package_name:
      - python3-websockify
    package_state: present
  include_role:
    name: safe_yum

- name: Desktop | Create TurboVNC symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "/opt/TurboVNC/bin/Xvnc",      dest: "/usr/bin/Xvnc" }
    - { src: "/opt/TurboVNC/bin/vncserver", dest: "/usr/bin/vncserver" }
    - { src: "/opt/TurboVNC/bin/vncpasswd", dest: "/usr/bin/vncpasswd" }
    - { src: "/opt/TurboVNC/bin/webserver", dest: "/usr/bin/webserver" }

- name: Desktop | Create /opt/websockify directory
  ansible.builtin.file:
    path: /opt/websockify
    state: directory
    mode: "0755"

- name: Desktop | Create websockify symlink
  ansible.builtin.file:
    src: /usr/bin/websockify
    dest: /opt/websockify/run
    state: link
    force: true
