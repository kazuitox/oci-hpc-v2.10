---
- name: Desktop | Ensure VirtualGL users group exists
  ansible.builtin.group:
    name: "{{ ood_vnc_vgl_group | default('vglusers') }}"
    gid: "{{ ood_vnc_vgl_gid | default(9877) }}"
    state: present
  when: ood_vnc_use_gpu | default(false) | bool

- name: Desktop | Add compute user to VirtualGL users group
  ansible.builtin.user:
    name: "{{ compute_username | default('opc') }}"
    groups: "{{ ood_vnc_vgl_group | default('vglusers') }}"
    append: true
  when: ood_vnc_use_gpu | default(false) | bool

- name: Desktop | Create TurboVNC symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "/opt/TurboVNC/bin/Xvnc",      dest: "/usr/bin/Xvnc" }
    - { src: "/opt/TurboVNC/bin/vncserver", dest: "/usr/bin/vncserver" }
    - { src: "/opt/TurboVNC/bin/vncpasswd", dest: "/usr/bin/vncpasswd" }
    - { src: "/opt/TurboVNC/bin/webserver", dest: "/usr/bin/webserver" }

- name: Desktop | Create /opt/websockify directory
  ansible.builtin.file:
    path: /opt/websockify
    state: directory
    mode: "0755"

- name: Desktop | Create websockify symlink
  ansible.builtin.file:
    src: /usr/bin/websockify
    dest: /opt/websockify/run
    state: link
    force: true
