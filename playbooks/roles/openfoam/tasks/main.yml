---
- name: Validate OpenFOAM options
  assert:
    that:
      - openfoam_application == 'OpenFOAM'
      - openfoam_version == 'v2312'
    fail_msg: "Only OpenFOAM v2312 is supported."

- name: Install OpenFOAM profile
  template:
    src: openfoam.sh.j2
    dest: /etc/profile.d/openfoam.sh
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Check whether this host compiles OpenFOAM
  set_fact:
    openfoam_compile_host: "{{ inventory_hostname in groups.get('controller', []) }}"

- name: Validate OpenFOAM build OS
  fail:
    msg: "OpenFOAM v2312 source build is currently supported on RedHat family hosts."
  when:
    - openfoam_compile_host | bool
    - ansible_os_family != 'RedHat'

- name: Install OpenFOAM build dependencies
  vars:
    package_repo: "ol8_appstream,ol8_developer_EPEL"
    package_name:
      - "@Development Tools"
      - cmake
      - boost
      - boost-devel
      - fftw
      - flex
      - m4
      - qt5-qtbase
      - qt5-qtbase-devel
      - tar
      - wget
  include_role:
    name: safe_yum
  when:
    - openfoam_compile_host | bool
    - ansible_os_family == 'RedHat'

- name: Find OpenMPI environment script
  shell: "find /usr/mpi/gcc -mindepth 3 -maxdepth 3 -path '*/bin/mpivars.sh' -print | sort | tail -n 1"
  args:
    executable: /bin/bash
  register: openfoam_mpivars
  changed_when: false
  failed_when: openfoam_mpivars.stdout == ''
  when: openfoam_compile_host | bool

- name: Create OpenFOAM root directory
  file:
    path: "{{ openfoam_root }}"
    state: directory
    owner: root
    group: "{{ privilege_group_name | default('root') }}"
    mode: '0775'
  become: true
  when: openfoam_compile_host | bool

- name: Download OpenFOAM source archive
  get_url:
    url: "{{ openfoam_source_url }}"
    dest: "{{ openfoam_root }}/OpenFOAM-{{ openfoam_version }}.tgz"
    mode: '0644'
  become: true
  when: openfoam_compile_host | bool

- name: Download OpenFOAM ThirdParty archive
  get_url:
    url: "{{ openfoam_thirdparty_url }}"
    dest: "{{ openfoam_root }}/ThirdParty-{{ openfoam_version }}.tgz"
    mode: '0644'
  become: true
  when: openfoam_compile_host | bool

- name: Extract OpenFOAM source
  unarchive:
    src: "{{ openfoam_root }}/OpenFOAM-{{ openfoam_version }}.tgz"
    dest: "{{ openfoam_root }}"
    remote_src: true
    creates: "{{ openfoam_project_dir }}/etc/bashrc"
  become: true
  when: openfoam_compile_host | bool

- name: Extract OpenFOAM ThirdParty source
  unarchive:
    src: "{{ openfoam_root }}/ThirdParty-{{ openfoam_version }}.tgz"
    dest: "{{ openfoam_root }}"
    remote_src: true
    creates: "{{ openfoam_thirdparty_dir }}"
  become: true
  when: openfoam_compile_host | bool

- name: Compile OpenFOAM
  shell: |
    set -eo pipefail
    source "{{ openfoam_mpivars.stdout }}"
    source "{{ openfoam_project_dir }}/etc/bashrc"
    foamSystemCheck
    cd "${WM_PROJECT_DIR}"
    export LC_ALL=C
    ./Allwmake -j {{ openfoam_build_jobs }} -s -q -l
    foamInstallationTest
  args:
    chdir: "{{ openfoam_project_dir }}"
    executable: /bin/bash
    creates: "{{ openfoam_build_marker }}"
  become: true
  when: openfoam_compile_host | bool
