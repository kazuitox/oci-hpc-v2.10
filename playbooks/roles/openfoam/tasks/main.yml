---
- name: Validate OpenFOAM options
  assert:
    that:
      - openfoam_application == 'OpenFOAM'
      - openfoam_version == 'v2312'
    fail_msg: "Only OpenFOAM v2312 is supported."

- name: Install OpenFOAM profile
  template:
    src: openfoam.sh.j2
    dest: /etc/profile.d/openfoam.sh
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Set OpenFOAM OS support facts
  set_fact:
    openfoam_redhat: "{{ ansible_facts['os_family'] == 'RedHat' }}"
    openfoam_ubuntu_2404: "{{ ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] is version('24.04', '==') }}"
    openfoam_supported_build_os: "{{ ansible_facts['os_family'] == 'RedHat' or (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] is version('24.04', '==')) }}"

- name: Select OpenFOAM compile host candidates
  set_fact:
    openfoam_compile_candidates: "{{ groups.get('controller', []) }}"
    openfoam_build_user: "{{ controller_username | default('opc') }}"

- name: Select OpenFOAM compile delegate and orchestrator
  set_fact:
    openfoam_compile_delegate: "{{ openfoam_compile_candidates | first | default('') }}"
    openfoam_compile_orchestrator: "{{ openfoam_compile_candidates | first | default('') }}"

- name: Check whether this host compiles OpenFOAM
  set_fact:
    openfoam_compile_host: "{{ openfoam_compile_orchestrator | length > 0 and inventory_hostname == openfoam_compile_orchestrator }}"

- name: Validate OpenFOAM compile delegate
  fail:
    msg: "OpenFOAM compile host was not found. The controller host must be present."
  when: openfoam_compile_delegate | length == 0

- name: Show OpenFOAM compile delegate
  debug:
    msg: "OpenFOAM build tasks will run on {{ openfoam_compile_delegate }}."
  when: openfoam_compile_host | bool

- name: Install OpenFOAM profile on Ubuntu 24.04 compute hosts
  template:
    src: openfoam.sh.j2
    dest: /etc/profile.d/openfoam.sh
    owner: root
    group: root
    mode: '0755'
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups.get('compute', []) }}"
  run_once: true
  when:
    - openfoam_ubuntu_2404 | bool
    - groups.get('compute', []) | length > 0

- name: Validate OpenFOAM build OS
  fail:
    msg: "OpenFOAM v2312 source build is currently supported on RedHat family and Ubuntu 24.04 hosts."
  when:
    - openfoam_compile_host | bool
    - not (openfoam_supported_build_os | bool)

- name: Install OpenFOAM build dependencies
  vars:
    package_repo: "ol8_appstream,ol8_developer_EPEL"
    package_name:
      - "@Development Tools"
      - cmake
      - boost
      - boost-devel
      - fftw
      - flex
      - m4
      - qt5-qtbase
      - qt5-qtbase-devel
      - rsync
      - tar
      - wget
  include_role:
    name: safe_yum
  when:
    - openfoam_compile_host | bool
    - openfoam_redhat | bool

- name: Install OpenFOAM build dependencies on Ubuntu 24.04
  apt:
    name:
      - autoconf
      - autotools-dev
      - bison
      - build-essential
      - ca-certificates
      - cmake
      - flex
      - gawk
      - gnuplot
      - libboost-system-dev
      - libboost-thread-dev
      - libcgal-dev
      - libfftw3-dev
      - libfl-dev
      - libgmp-dev
      - libmpc-dev
      - libmpfr-dev
      - libncurses-dev
      - libreadline-dev
      - libscotch-dev
      - libxt-dev
      - rsync
      - tar
      - wget
      - zlib1g-dev
    state: present
    update_cache: true
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  register: openfoam_ubuntu_dependencies
  until: openfoam_ubuntu_dependencies is not failed
  retries: 5
  delay: 5
  when:
    - openfoam_compile_host | bool
    - openfoam_ubuntu_2404 | bool

- name: Find OpenMPI environment script on RedHat
  shell: "find /usr/mpi/gcc -mindepth 3 -maxdepth 3 -path '*/bin/mpivars.sh' -print | sort | tail -n 1"
  args:
    executable: /bin/bash
  register: openfoam_redhat_mpivars
  changed_when: false
  failed_when: openfoam_redhat_mpivars.stdout == ''
  when:
    - openfoam_compile_host | bool
    - openfoam_redhat | bool

- name: Set OpenFOAM MPI environment on RedHat
  set_fact:
    openfoam_mpi_environment_setup: |
      source "{{ openfoam_redhat_mpivars.stdout }}"
  when:
    - openfoam_compile_host | bool
    - openfoam_redhat | bool

- name: Validate OpenMPI root on Ubuntu 24.04
  stat:
    path: "{{ openfoam_ubuntu_mpi_root }}"
  register: openfoam_ubuntu_mpi_root_stat
  failed_when: not (openfoam_ubuntu_mpi_root_stat.stat.isdir | default(false) | bool)
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - openfoam_ubuntu_2404 | bool

- name: Validate OpenMPI compiler on Ubuntu 24.04
  command: "{{ openfoam_ubuntu_mpi_root }}/bin/mpicc --show"
  register: openfoam_ubuntu_mpicc
  changed_when: false
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - openfoam_ubuntu_2404 | bool

- name: Set OpenFOAM MPI environment on Ubuntu 24.04
  set_fact:
    openfoam_mpi_environment_setup: |
      export MPI_ROOT="{{ openfoam_ubuntu_mpi_root }}"
      export PATH="${MPI_ROOT}/bin:${PATH}"
      export LD_LIBRARY_PATH="${MPI_ROOT}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
      export MANPATH="${MPI_ROOT}/share/man${MANPATH:+:${MANPATH}}"
  when:
    - openfoam_compile_host | bool
    - openfoam_ubuntu_2404 | bool

- name: Create OpenFOAM install root directory
  file:
    path: "{{ openfoam_root }}"
    state: directory
    owner: root
    group: "{{ privilege_group_name | default('root') }}"
    mode: '0775'
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  when: openfoam_compile_host | bool

- name: Check OpenFOAM install marker
  stat:
    path: "{{ openfoam_install_marker }}"
  register: openfoam_install_marker_stat
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  when: openfoam_compile_host | bool

- name: Create OpenFOAM local build root directory
  file:
    path: "{{ openfoam_build_root }}"
    state: directory
    owner: "{{ openfoam_build_user }}"
    mode: '0755'
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Download OpenFOAM source archive
  get_url:
    url: "{{ openfoam_source_url }}"
    dest: "{{ openfoam_build_root }}/OpenFOAM-{{ openfoam_version }}.tgz"
    mode: '0644'
  become: true
  become_user: "{{ openfoam_build_user }}"
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Download OpenFOAM ThirdParty archive
  get_url:
    url: "{{ openfoam_thirdparty_url }}"
    dest: "{{ openfoam_build_root }}/ThirdParty-{{ openfoam_version }}.tgz"
    mode: '0644'
  become: true
  become_user: "{{ openfoam_build_user }}"
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Extract OpenFOAM source into local build root
  unarchive:
    src: "{{ openfoam_build_root }}/OpenFOAM-{{ openfoam_version }}.tgz"
    dest: "{{ openfoam_build_root }}"
    remote_src: true
    creates: "{{ openfoam_build_project_dir }}/etc/bashrc"
  become: true
  become_user: "{{ openfoam_build_user }}"
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Extract OpenFOAM ThirdParty source into local build root
  unarchive:
    src: "{{ openfoam_build_root }}/ThirdParty-{{ openfoam_version }}.tgz"
    dest: "{{ openfoam_build_root }}"
    remote_src: true
    creates: "{{ openfoam_build_thirdparty_dir }}"
  become: true
  become_user: "{{ openfoam_build_user }}"
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Check OpenFOAM local build marker
  stat:
    path: "{{ openfoam_build_marker }}"
  register: openfoam_local_build_marker_stat
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Build and verify OpenFOAM locally
  vars:
    openfoam_build_environment: |
      set -o pipefail

      openfoam_fail() {
          local rc="$1"
          shift
          echo "FAILED command: $* (rc=${rc})" >&2
          exit "${rc}"
      }

      openfoam_run() {
          "$@"
          local rc=$?
          if [ "${rc}" -ne 0 ]; then
              openfoam_fail "${rc}" "$@"
          fi
      }

      openfoam_cd() {
          cd "$1"
          local rc=$?
          if [ "${rc}" -ne 0 ]; then
              openfoam_fail "${rc}" "cd $1"
          fi
      }

      {{ openfoam_mpi_environment_setup }}
      for openfoam_env_file in "{{ openfoam_build_project_dir }}/etc/bashrc"; do
          if [ ! -r "${openfoam_env_file}" ]; then
              echo "OpenFOAM environment file is not readable: ${openfoam_env_file}" >&2
              exit 1
          fi
      done
      source "{{ openfoam_build_project_dir }}/etc/bashrc"
      if [ -z "${WM_PROJECT_DIR:-}" ]; then
          echo "WM_PROJECT_DIR is not set after sourcing {{ openfoam_build_project_dir }}/etc/bashrc" >&2
          exit 1
      fi
      export LC_ALL=C
  block:
    - name: Check OpenFOAM build environment
      shell: |
        {{ openfoam_build_environment }}
        openfoam_run foamSystemCheck
      args:
        chdir: "{{ openfoam_build_project_dir }}"
        executable: /bin/bash
      changed_when: false

    - name: Compile OpenFOAM
      shell: |
        {{ openfoam_build_environment }}
        openfoam_cd "${WM_PROJECT_DIR}"
        openfoam_run ./Allwmake -j {{ openfoam_build_jobs }} -s -q -l
      args:
        chdir: "{{ openfoam_build_project_dir }}"
        executable: /bin/bash
        creates: "{{ openfoam_build_marker }}"

    - name: Test local OpenFOAM installation
      shell: |
        {{ openfoam_build_environment }}
        openfoam_run foamInstallationTest
      args:
        chdir: "{{ openfoam_build_project_dir }}"
        executable: /bin/bash
      changed_when: false
  become: true
  become_user: "{{ openfoam_build_user }}"
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)
    - not (openfoam_local_build_marker_stat.stat.exists | default(false) | bool)

- name: Copy OpenFOAM build to install root
  shell: |
    set -o pipefail
    mkdir -p "{{ openfoam_project_dir }}" "{{ openfoam_thirdparty_dir }}"

    pids=()
    names=()

    rsync -a --delete --no-owner --no-group "{{ openfoam_build_project_dir }}/" "{{ openfoam_project_dir }}/" &
    pids+=("$!")
    names+=("OpenFOAM-{{ openfoam_version }}")

    rsync -a --delete --no-owner --no-group "{{ openfoam_build_thirdparty_dir }}/" "{{ openfoam_thirdparty_dir }}/" &
    pids+=("$!")
    names+=("ThirdParty-{{ openfoam_version }}")

    copy_status=0
    for idx in "${!pids[@]}"; do
        if ! wait "${pids[$idx]}"; then
            echo "FAILED copy: ${names[$idx]}" >&2
            copy_status=1
        fi
    done

    exit "${copy_status}"
  args:
    executable: /bin/bash
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  when:
    - openfoam_compile_host | bool
    - not (openfoam_install_marker_stat.stat.exists | default(false) | bool)

- name: Test OpenFOAM installation from install root
  vars:
    openfoam_install_environment: |
      set -o pipefail

      openfoam_fail() {
          local rc="$1"
          shift
          echo "FAILED command: $* (rc=${rc})" >&2
          exit "${rc}"
      }

      openfoam_run() {
          "$@"
          local rc=$?
          if [ "${rc}" -ne 0 ]; then
              openfoam_fail "${rc}" "$@"
          fi
      }

      {{ openfoam_mpi_environment_setup }}
      for openfoam_env_file in "{{ openfoam_project_dir }}/etc/bashrc"; do
          if [ ! -r "${openfoam_env_file}" ]; then
              echo "OpenFOAM environment file is not readable: ${openfoam_env_file}" >&2
              exit 1
          fi
      done
      source "{{ openfoam_project_dir }}/etc/bashrc"
      if [ -z "${WM_PROJECT_DIR:-}" ]; then
          echo "WM_PROJECT_DIR is not set after sourcing {{ openfoam_project_dir }}/etc/bashrc" >&2
          exit 1
      fi
      export LC_ALL=C
  shell: |
    {{ openfoam_install_environment }}
    openfoam_run foamInstallationTest
  args:
    chdir: "{{ openfoam_project_dir }}"
    executable: /bin/bash
  become: true
  become_user: "{{ openfoam_build_user }}"
  delegate_to: "{{ openfoam_compile_delegate }}"
  changed_when: false
  when: openfoam_compile_host | bool

- name: Mark OpenFOAM installation complete
  copy:
    dest: "{{ openfoam_install_marker }}"
    content: "OpenFOAM {{ openfoam_version }} installed\n"
    owner: root
    group: "{{ privilege_group_name | default('root') }}"
    mode: '0644'
  become: true
  delegate_to: "{{ openfoam_compile_delegate }}"
  when: openfoam_compile_host | bool
