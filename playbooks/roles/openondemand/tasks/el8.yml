---
- block:
    - name: Set facts | Resolve servername/private_ip for OOD
      ansible.builtin.set_fact:
        ood_servername: >-
          {{ (ood_public_hostname | trim)
             if (ood_public_hostname | default('') | trim | length > 0)
             else (
               (controller_public_ip | trim)
               if (controller_public_ip | default('') | trim | length > 0)
               else (ansible_host
                     | default((ansible_default_ipv4 | default({})).address | default('')))
             ) }}
        ood_private_ip: "{{ (ansible_default_ipv4 | default({})).address | default(ansible_host) }}"
        ood_effective_ldap_host: "{{ ood_ldap_host }}"
        ood_ldap_hostname: "{{ ood_ldap_host.split(':')[0] }}"

    - name: Set facts | Classify OOD servername
      ansible.builtin.set_fact:
        ood_server_is_ip: "{{ ood_servername is match('^([0-9]{1,3}\\.){3}[0-9]{1,3}$') }}"

    - name: OpenOnDemand | Set opc password when provided
      ansible.builtin.user:
        name: opc
        password: "{{ ood_opc_password | password_hash('sha512') }}"
      when:
        - ood_opc_password | default('') | length > 0
      no_log: true

    - name: Install packages for repo management (dnf plugins)
      ansible.builtin.dnf:
        name:
          - dnf-plugins-core
        state: present

    - name: Enable EPEL release
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Enable required Oracle Linux repos (yum-config-manager)
      ansible.builtin.command: "yum-config-manager --enable {{ item }}"
      changed_when: true
      loop:
        - ol8_codeready_builder
        - ol8_developer_EPEL

    - name: Enable module ruby:3.3
      ansible.builtin.command: "dnf -y module enable ruby:3.3"
      changed_when: true

    - name: Enable module nodejs:20
      ansible.builtin.command: "dnf -y module enable nodejs:20"
      changed_when: true

    - name: Install Open OnDemand repo release rpm
      ansible.builtin.dnf:
        name: "https://yum.osc.edu/ondemand/4.0/ondemand-release-web-4.0-1.el8.noarch.rpm"
        state: present
        disable_gpg_check: true

    - name: Install Open OnDemand Dex login packages
      ansible.builtin.dnf:
        name:
          - ondemand
          - ondemand-dex
          - mod_auth_openidc
          - httpd-tools
          - mod_authnz_pam
        state: present

    - name: Enable and start httpd
      ansible.builtin.service:
        name: httpd
        enabled: true
        state: started

    - name: Ensure directories for TLS files exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/pki/tls/private
        - /etc/pki/tls/certs
        - "{{ ssl_cert_path }}"

    - name: OpenOnDemand | Ensure cluster CA exists for OOD TLS
      ansible.builtin.command: >
        openssl req -newkey rsa:4096
        -nodes -sha512 -x509
        -days {{ ssl_cert_days | default(3650) }}
        -subj "/C=US/L=Seattle/O=Oracle Cloud/CN=oraclecluster.com"
        -out {{ ssl_ca_cert }}
        -keyout {{ ssl_cert_path }}/cluster-ca.key
      args:
        creates: "{{ ssl_ca_cert }}"

    - name: OpenOnDemand | Render TLS certificate request config
      ansible.builtin.template:
        src: ood_tls_server.cnf.j2
        dest: "{{ ood_tls_config }}"
        mode: "0644"

    - name: OpenOnDemand | Inspect existing TLS certificate
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ ood_tls_cert }}"
          - -noout
          - -text
      register: ood_existing_tls_cert
      changed_when: false
      failed_when: false

    - name: OpenOnDemand | Verify existing TLS certificate against cluster CA
      ansible.builtin.command:
        argv:
          - openssl
          - verify
          - -CAfile
          - "{{ ssl_ca_cert }}"
          - "{{ ood_tls_cert }}"
      register: ood_existing_tls_verify
      changed_when: false
      failed_when: false

    - name: OpenOnDemand | Decide whether to regenerate TLS certificate
      ansible.builtin.set_fact:
        ood_tls_needs_regen: >-
          {{ ood_existing_tls_cert.rc != 0
             or ood_existing_tls_verify.rc != 0
             or 'CA:FALSE' not in ood_existing_tls_cert.stdout
             or (ood_server_is_ip | bool and ('IP Address:' ~ ood_servername) not in ood_existing_tls_cert.stdout)
             or (not (ood_server_is_ip | bool) and ('DNS:' ~ ood_servername) not in ood_existing_tls_cert.stdout) }}

    - name: OpenOnDemand | Create TLS certificate signing request
      ansible.builtin.command: >
        openssl req -new -newkey rsa:4096 -nodes -sha256
        -keyout {{ ood_tls_key }}
        -out {{ ood_tls_csr }}
        -subj "/CN={{ ood_servername }}"
        -config {{ ood_tls_config }}
      when: ood_tls_needs_regen | bool

    - name: OpenOnDemand | Sign TLS certificate with cluster CA
      ansible.builtin.command: >
        openssl x509 -req
        -in {{ ood_tls_csr }}
        -CA {{ ssl_ca_cert }}
        -CAkey {{ ssl_cert_path }}/cluster-ca.key
        -CAcreateserial
        -out {{ ood_tls_cert }}
        -days {{ ood_tls_days }}
        -sha256
        -extfile {{ ood_tls_config }}
        -extensions v3_server
      when: ood_tls_needs_regen | bool

    - name: OpenOnDemand | Set TLS certificate permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ ood_tls_key }}"
          mode: "0600"
        - path: "{{ ood_tls_cert }}"
          mode: "0644"

    - name: Install cluster CA into local trust anchors
      ansible.builtin.copy:
        src: "{{ ssl_ca_cert }}"
        remote_src: true
        dest: "/etc/pki/ca-trust/source/anchors/cluster-ca.crt"
        mode: "0644"

    - name: Update CA trust
      ansible.builtin.command: "update-ca-trust extract"
      changed_when: true

    - name: Ensure OOD config directory exists
      ansible.builtin.file:
        path: /etc/ood/config
        state: directory
        mode: "0755"

    - name: OpenOnDemand | Ensure OOD public hostname resolves locally
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK FOR OOD PUBLIC HOSTNAME"
        block: |
          {{ ood_private_ip }} {{ ood_servername }}
      when:
        - not (ood_server_is_ip | bool)
        - ood_private_ip | default('') | length > 0

    - name: OpenOnDemand | Ensure OpenLDAP certificate directory exists
      ansible.builtin.file:
        path: "{{ ood_ldap_root_ca | dirname }}"
        state: directory
        mode: "0755"
      when:
        - ood_enable_dex_ldap | bool
        - ood_ldap_root_ca | default('') | length > 0

    - name: OpenOnDemand | Install LDAP CA for Dex
      ansible.builtin.copy:
        src: "{{ ssl_ca_cert }}"
        remote_src: true
        dest: "{{ ood_ldap_root_ca }}"
        mode: "0644"
      when:
        - ood_enable_dex_ldap | bool
        - ood_ldap_root_ca | default('') | length > 0

    - name: OpenOnDemand | Ensure LDAP certificate hostname resolves locally
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '(^|\s){{ ood_ldap_hostname | regex_escape }}(\s|$)'
        line: "{{ ood_private_ip }} {{ ood_ldap_hostname }}"
      when:
        - ood_enable_dex_ldap | bool
        - ood_ldap_hostname == 'controller.cluster'

    - name: OpenOnDemand | Mark static Dex login as enabled
      ansible.builtin.set_fact:
        ood_dex_static_enabled: "{{ ood_enable_dex_static | bool }}"

    - name: OpenOnDemand | Generate static Dex password hash
      ansible.builtin.command:
        argv:
          - htpasswd
          - -bnBC
          - "10"
          - ""
          - "{{ ood_opc_password }}"
      register: ood_dex_static_hash_cmd
      changed_when: false
      no_log: true
      when:
        - ood_dex_static_enabled | bool
        - ood_dex_static_hash | default('') | length == 0
        - ood_opc_password | default('') | length > 0

    - name: OpenOnDemand | Resolve static Dex password hash
      ansible.builtin.set_fact:
        ood_dex_static_password_hash_effective: >-
          {{ (ood_dex_static_hash
              if (ood_dex_static_hash | default('') | length > 0)
              else ((ood_dex_static_hash_cmd.stdout | default('')) | regex_replace('^:', '') | trim))
             | regex_replace('^\\$2y\\$', '$2a$') }}
      no_log: true
      when: ood_dex_static_enabled | bool

    - name: OpenOnDemand | Validate Dex authentication inputs
      ansible.builtin.assert:
        that:
          - ood_enable_dex_ldap | bool or ood_dex_static_enabled | bool
          - not (ood_dex_static_enabled | bool) or (ood_dex_static_password_hash_effective | default('') | length > 0)
          - ood_ldap_anonymous_bind | bool or (ood_ldap_bind_dn | length > 0 and ood_ldap_bind_pw | length > 0)
        fail_msg: >-
          Open OnDemand Dex login needs LDAP enabled or static login enabled.
          For static login, set ood_opc_password or ood_dex_static_hash.
          For non-anonymous LDAP bind, set ood_ldap_bind_dn and ood_ldap_bind_pw.

    - name: Deploy ood_portal.yml for Dex login
      ansible.builtin.template:
        src: ood_portal.yml.j2
        dest: /etc/ood/config/ood_portal.yml
        mode: "0644"

    - name: OpenOnDemand | Ensure httpd systemd drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/httpd.service.d
        state: directory
        mode: "0755"

    - name: OpenOnDemand | Override httpd portal generator command
      ansible.builtin.copy:
        dest: /etc/systemd/system/httpd.service.d/zz-ood-portal-insecure.conf
        mode: "0644"
        content: |
          [Service]
          ExecStartPre=
          ExecStartPre=-/opt/ood/ood-portal-generator/sbin/update_ood_portal --insecure --force
          ExecReload=
          ExecReload=-/opt/ood/ood-portal-generator/sbin/update_ood_portal --insecure --force
          ExecReload=/usr/sbin/httpd $OPTIONS -k graceful
      register: ood_httpd_portal_dropin

    - name: OpenOnDemand | Reload systemd for httpd portal override
      ansible.builtin.systemd:
        daemon_reload: true
      when: ood_httpd_portal_dropin.changed

    - name: OpenOnDemand | Reset httpd and Dex failed state
      ansible.builtin.command: systemctl reset-failed httpd ondemand-dex
      changed_when: false
      failed_when: false

    - name: Generate/Update OOD Apache portal config
      ansible.builtin.command: "/opt/ood/ood-portal-generator/sbin/update_ood_portal --insecure --force"
      changed_when: true

    - name: Ensure clusters.d directory exists
      ansible.builtin.file:
        path: /etc/ood/config/clusters.d
        state: directory
        mode: "0755"

    - name: Deploy Slurm cluster definition
      ansible.builtin.copy:
        dest: /etc/ood/config/clusters.d/myslurm.yml
        mode: "0644"
        content: |
          ---
          v2:
            metadata:
              title: "ログインノード"
              hidden: false
            login:
              host: "{{ ood_servername }}"
              default: true
            job:
              adapter: "slurm"
              bin: "/usr/bin"
              conf: "/etc/slurm/slurm.conf"
              copy_environment: false

    - name: Apply OOD theme/branding
      ansible.builtin.include_tasks: ood_theme_apply_tasks.yml
      vars:
        ood_theme_assets_base_url: "https://raw.githubusercontent.com/koiker/oci-hpc/master/artifacts/ondemand"
        ood_theme_assets:
          - "oci_logo.png"
          - "header_logo.png"
          - "oj-redwood-min.css"
          - "favicon.ico"
        ood_ux_config_url: "https://raw.githubusercontent.com/koiker/oci-hpc/master/artifacts/ondemand/oracle_ux.yml"

    - name: OpenOnDemand | Apply dashboard customizations
      ansible.builtin.include_tasks: ood_dashboard_customizations.yml

    - name: Apache config test
      ansible.builtin.command: apachectl configtest
      register: apache_configtest
      changed_when: false

    - name: Restart httpd (do not block)
      ansible.builtin.systemd:
        name: httpd
        state: restarted
        no_block: true

    - name: Wait until httpd becomes active
      ansible.builtin.command: systemctl is-active httpd
      register: httpd_active
      retries: 30
      delay: 2
      until: httpd_active.stdout.strip() == "active"
      changed_when: false

    - name: OpenOnDemand | Add node routing settings to ood_portal.yml
      ansible.builtin.blockinfile:
        path: /etc/ood/config/ood_portal.yml
        marker: "# {mark} ANSIBLE MANAGED BLOCK FOR OOD NODE ROUTING"
        insertafter: EOF
        block: |
          host_regex: 'desktop-[\w-]+'
          node_uri: '/node'
          rnode_uri: '/rnode'

    - name: OpenOnDemand | Update bc_desktop submit.yml.erb
      ansible.builtin.copy:
        dest: /var/www/ood/apps/sys/bc_desktop/submit.yml.erb
        owner: root
        group: root
        mode: "0644"
        content: |
          ---
          batch_connect:
            template: vnc
          cluster: "myslurm"
          script:
            queue_name: <%= bc_queue %>

    - name: OpenOnDemand | Update bc_desktop form.yml
      ansible.builtin.copy:
        dest: /var/www/ood/apps/sys/bc_desktop/form.yml
        owner: root
        group: root
        mode: "0644"
        content: |
          ---
          cluster: "myslurm"
    
          attributes:
            bc_vnc_idle: 0
            bc_vnc_resolution:
              required: true
            desktop:
              label: "Desktop Environment"
              widget: select
              options:
                - "gnome"
            node_type: null
            bc_queue:
              value: "desktop"
    
          form:
            - bc_vnc_idle
            - desktop
            - bc_num_hours
            - bc_queue

    - name: OpenOnDemand | Regenerate Apache config
      ansible.builtin.command: /opt/ood/ood-portal-generator/sbin/update_ood_portal --insecure --force
      changed_when: true

    - name: OpenOnDemand | Enable and restart Dex
      ansible.builtin.service:
        name: ondemand-dex
        enabled: true
        state: restarted

    - name: OpenOnDemand | Restart httpd
      ansible.builtin.service:
        name: httpd
        state: restarted

  become: true
