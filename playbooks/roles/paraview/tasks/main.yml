---
- name: Validate ParaView options
  assert:
    that:
      - paraview_version == '5.11.2'
    fail_msg: "Only ParaView 5.11.2 is supported."

- name: Set ParaView OS support facts
  set_fact:
    paraview_ubuntu_2404: "{{ ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] is version('24.04', '==') }}"

- name: Install ParaView runtime dependencies on Ubuntu 24.04
  vars:
    package_name:
      - fontconfig
      - libdbus-1-3
      - libegl1
      - libfontconfig1
      - libfreetype6
      - libgl1
      - libglu1-mesa
      - libice6
      - libopengl0
      - libsm6
      - libx11-6
      - libx11-xcb1
      - libxcb1
      - libxcb-cursor0
      - libxcb-glx0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-shm0
      - libxcb-sync1
      - libxcb-util1
      - libxcb-xfixes0
      - libxcb-xinerama0
      - libxcb-xinput0
      - libxcb-xkb1
      - libxext6
      - libxkbcommon-x11-0
      - libxrender1
      - libxt6
      - tar
    package_cache: true
    package_state: present
  include_role:
    name: safe_yum
  when: paraview_ubuntu_2404 | bool

- name: Create ParaView profile
  template:
    src: paraview.sh.j2
    dest: "{{ paraview_profile_path }}"
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Create ParaView directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: "{{ privilege_group_name | default('root') }}"
    mode: '0775'
  loop:
    - "{{ paraview_prepost_dir }}"
    - "{{ paraview_install_dir }}"
  become: true
  run_once: true

- name: Check ParaView installation
  stat:
    path: "{{ paraview_install_dir }}/bin/paraview"
  register: paraview_binary
  become: true
  run_once: true

- name: Download ParaView archive
  get_url:
    url: "{{ paraview_download_url }}"
    dest: "{{ paraview_archive_path }}"
    mode: '0644'
  become: true
  run_once: true
  when: not paraview_binary.stat.exists

- name: Extract ParaView archive into install directory
  unarchive:
    src: "{{ paraview_archive_path }}"
    dest: "{{ paraview_install_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    creates: "{{ paraview_install_dir }}/bin/paraview"
  become: true
  run_once: true
  when: not paraview_binary.stat.exists

- name: Set ParaView permissions
  file:
    path: "{{ paraview_install_dir }}"
    state: directory
    owner: root
    group: "{{ privilege_group_name | default('root') }}"
    recurse: true
  become: true
  run_once: true
  when: not paraview_binary.stat.exists
