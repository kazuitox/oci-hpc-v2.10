---
  queues:
    - name: ${queue}
      default: true
      instance_types: 
        - name: hpc-default
          default: true
          shape: ${shape}
          instance_keyword: hpc
          permanent: false
          cluster_network: ${cluster_network}
          compute_cluster: ${compute_cluster}
          max_number_nodes: 1000
          max_cluster_size: 50
          max_cluster_count: 1000
          region: ${region}
          ad: ${ad}
          private_subnet: ${private_subnet}
          private_subnet_id: ${private_subnet_id}
          image: ${image}
          targetCompartment: ${targetCompartment}
          boot_volume_size: ${boot_volume_size}
          use_marketplace_image: ${use_marketplace_image}
          use_compute_agent: ${use_compute_agent}
          instance_pool_ocpus: ${instance_pool_ocpus}
          instance_pool_memory: ${instance_pool_memory}
          instance_pool_custom_memory: ${instance_pool_custom_memory}
          marketplace_listing: ${marketplace_listing}
          hyperthreading: ${hyperthreading}
          tags: ${tags}
        - name: permanent
          default: false
          shape: ${shape}
          instance_keyword: permanent
          permanent: true
          cluster_network: ${cluster_network}
          compute_cluster: ${compute_cluster}
          max_number_nodes: 1000
          max_cluster_size: 50
          max_cluster_count: 1000
          region: ${region}
          ad: ${ad}
          private_subnet: ${private_subnet}
          private_subnet_id: ${private_subnet_id}
          image: ${image}
          targetCompartment: ${targetCompartment}
          boot_volume_size: ${boot_volume_size}
          use_marketplace_image: ${use_marketplace_image}
          use_compute_agent: ${use_compute_agent}
          instance_pool_ocpus: ${instance_pool_ocpus}
          instance_pool_memory: ${instance_pool_memory}
          instance_pool_custom_memory: ${instance_pool_custom_memory}
          marketplace_listing: ${marketplace_listing}
          hyperthreading: ${hyperthreading}
          tags: ${tags}
%{ if use_ood }
    - name: desktop
      default: false
      instance_types:
        - name: desktop-default
          default: true
          shape: ${ood_vnc_shape}
          instance_keyword: small
          permanent: false
          cluster_network: false
          compute_cluster: false
          max_number_nodes: 10
          max_cluster_size: 10
          max_cluster_count: 1
          region: ${region}
          ad: ${ad}
          private_subnet: ${private_subnet}
          private_subnet_id: ${private_subnet_id}
          image: ${ood_vnc_image}
          targetCompartment: ${targetCompartment}
          boot_volume_size: 100
          use_marketplace_image: false
          use_compute_agent: true
          instance_pool_ocpus: ${ood_vnc_instance_pool_ocpus}
          instance_pool_memory: 16
          instance_pool_custom_memory: true
          marketplace_listing: HPC_OL8
          hyperthreading: true
          tags: user
%{ endif }
