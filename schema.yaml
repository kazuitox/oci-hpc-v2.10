  vcn_subnet:
    type: string
    title: VCN IP 範囲
    description: VCN subnet
    default: 172.16.0.0/21
    required: true
    visible:
      not:
      - ${use_existing_vcn}
  public_subnet:
    type: string
    title: Master Node Subnet IP 範囲
    default: 172.16.0.0/24
    description: VCN subnet 内である必要があります
    required: true
    visible:
      not:
      - ${use_existing_vcn}
  additional_subnet:
    type: string
    title: 追加 Subnet IP 範囲
    default: 172.16.1.0/24
    description: VCN subnet 内である必要があります
    required: true
    visible:
      not:
      - ${use_existing_vcn}
  rdma_subnet:
    type: string
    title: RDMA Subnet IP 範囲
    default: 10.224.0.0/12
    description: HPC では Private Subnet と同じサイズ以上、GPU では Private Subnet の 16 倍以上のサイズが必要です。現在 Compute Agent では変更できません
    required: true
  private_subnet:
    type: string
    title: Private Subnet IP 範囲
    default: 172.16.4.0/22
    description: VCN subnet 内である必要があります
    required: true
    visible:
      not:
      - ${use_existing_vcn}
  ssh_cidr:
    type: string
    title: SSH を許可する初期 CIDR 範囲
    default: 0.0.0.0/0
    description: CIDR 表記で指定する許可 SSH network
    required: true
  slurm:
    type: boolean
    title: SLURM をインストール
    default: true
    description: Autoscaling に必要です
  slurm_nfs:
    type: boolean
    title: spool directory を共有
    default: false
    description: Slurm spool directory を user NFS にインストールします
    visible:
      and:
      - ${slurm}
      - ${add_nfs}
  use_ood:
    type: boolean
    title: Open OnDemand をインストール
    default: true
    description: Open OnDemand は、HPC resources へのセキュアなブラウザベースアクセスを提供する Web ベース platform です。ユーザーは直接 SSH access せずに application の実行、file 管理、job 投入を行えます。
  ood_source_cidr:
    type: string
    title: Open OnDemand へのアクセスを許可する CIDR 範囲
    description: 'HTTPS/443 へのアクセスを許可する送信元 CIDR です。例: 203.0.113.10/32'
    required: true
    visible: ${use_ood}
  slurm_ha:
    type: boolean
    title: バックアップ Slurm Controller を作成
    default: false
    required: true
    description: controller と同じ Shape の 2 台目の master をバックアップ controller node として追加します。state の保存と master 間の共有には FSS の使用を推奨します
    visible: ${slurm}
  pyxis:
    type: boolean
    title: Slurm 用 Nvidia Pyxis plugin をインストール
    default: false
    description: 'Pyxis をインストールします。Pyxis は Enroot を Slurm と統合する plugin です。（警告: Pyxis を autoscaling と併用すると、起動対象の node に job がスケジュールされない問題が発生します）'
    visible:
      and:
      - ${slurm}
      - ${enroot}
  rack_aware:
    type: boolean
    title: rack aware topology を作成
    default: false
    required: true
    description: Slurm topology では、job ごとに同一 rack 上の node を優先する rack aware topology を定義できます。この機能は LA feature であり、tenancy の whitelist 登録が必要です
    visible: ${slurm}
  queue:
    type: String
    title: Queue 名
    default: compute
    required: true
    description: permanent cluster を特定の queue に追加します。デフォルト queue は compute です
    visible: ${slurm}
  spack:
    type: boolean
    title: Spack package manager をインストール
    default: false
    description: Spack package manager をインストールします。shared folder が必要です
  install_application:
    type: boolean
    title: アプリケーションを追加
    default: false
    description: Oracle Linux 8 または Ubuntu 24.04 の共有領域に OpenFOAM v2312 / ParaView 5.11.2 をインストールします。Ubuntu 24.04 で OpenFOAM を選択した場合、controller 上の /usr/mpi/gcc/openmpi-4.1.9a1 を使用してビルドします。
  application:
    type: string
    default: OpenFOAM
    visible: false
  application_version:
    type: string
    default: v2312
    visible: false
  install_openfoam:
    type: boolean
    title: OpenFOAM をインストール
    default: false
    visible: ${install_application}
  openfoam_version:
    type: enum
    title: OpenFOAM バージョン
    default: v2312
    enum:
    - v2312
    visible:
      and:
      - ${install_application}
      - ${install_openfoam}
  install_paraview:
    type: boolean
    title: ParaView をインストール
    default: false
    visible: ${install_application}
  paraview_version:
    type: enum
    title: ParaView バージョン
    default: '5.11.2'
    enum:
    - '5.11.2'
    visible:
      and:
      - ${install_application}
      - ${install_paraview}
  enroot:
    type: boolean
    title: コンテナ化 GPU workload 用 Nvidia Enroot をインストール
    default: false
    description: Enroot、Nvidia Container Toolkit、docker をインストールします。
    visible: ${slurm}
  pam:
    type: boolean
    title: PAM を有効化
    default: false
    description: Slurm cluster で PAM を有効化します（現時点では RHCK kernel の OL と Ubuntu でサポート）。PAM が有効な場合、sudo group に属していないユーザーは Slurm で実行中の active job がない限り compute node に SSH できません。
    visible: ${slurm}
  sacct_limits:
    type: boolean
    title: Slurm job の Limits を有効化
    default: false
    description: Slurm cluster の Limits を有効化します。有効化すると、適切な limits が設定されていない場合にユーザーは job を投入できません
    visible: ${slurm}
  healthchecks:
    type: boolean
    title: GPU node の Healthcheck を有効化
    default: false
    description: job 開始前に GPU node で test を実行します。問題がある node は drain state に設定されます
    visible: ${slurm}
  monitoring:
    type: boolean
    title: HPC Cluster Monitoring Tools をインストール
    default: false
    description: system monitoring 用に Grafana、Telegrapf、InfluxDB tools をインストールします。
  autoscaling:
    type: boolean
    title: Scheduler ベース Autoscaling
    default: true
    description: SLURM のインストールが必要です。Scheduler は job requirements に基づいて新しい cluster を起動します
  latency_check:
    type: boolean
    title: RDMA Latency check
    default: true
    description: autoscaling 中に HPC および Optimized shapes の Cluster Networks で RDMA connection を検証します
  inst_prin:
    type: boolean
    title: configuration file の代わりに Instance Principal を使用
    description: controller が認証できるように Dynamic Group と Policy を設定する必要があります。これは自動作成されません。
    default: true
  api_user_key:
    type: file
    title: API private key
    default: ''
    visible:
      not:
      - ${inst_prin}
    required: true
  api_fingerprint:
    type: string
    title: API fingerprint
    default: ''
    visible:
      not:
      - ${inst_prin}
    required: true
  api_user_ocid:
    type: string
    title: API User OCID
    default: ''
    visible:
      not:
      - ${inst_prin}
    required: true
  configure:
    type: boolean
    title: システムを構成
    default: true
    description: チェックを外すと、cluster は起動されますが未構成のままになります
  add_nfs:
    type: boolean
    title: 別の NFS ファイルシステムを追加
    default: false
    description: FSS の場合は options 欄を空のままにしてください。ここから /home をマウントしないでください。ストレージ詳細オプションにそのためのフラグがあります。
    visible: true
  create_fss:
    type: boolean
    title: FSS を作成
    default: false
    description: FSS の場合は options 欄を空のままにしてください。
    visible: ${add_nfs}
  mount_target_count:
    title: FSS Mount Target 数
    description: File System で使用する FSS Mount Target の数
    type: integer
    default: 1
    required: true
    visible:
      and:
      - ${add_nfs}
      - ${create_fss}
  fss_compartment:
    title: FSS コンパートメント
    description: FSS Mount Target と File System を追加するコンパートメント
    type: oci:identity:compartment:id
    default: ${targetCompartment}
    required: true
    visible:
      and:
      - eq:
        - ${ui_mode}
        - ADVANCED
      - ${add_nfs}
      - ${create_fss}
  fss_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${fss_compartment}
    visible:
      and:
      - eq:
        - ${ui_mode}
        - ADVANCED
      - ${add_nfs}
      - ${create_fss}
    default: ${ad}
    description: FSS Availability Domain
    title: FSS Availability Domain
    required: true
  localdisk:
    type: boolean
    title: Localdisk をマウント
    default: true
    description: NVMe を使用する node で localdisk をマウントします
    visible: ${use_advanced}
  log_vol:
    type: boolean
    title: 1 つの Logical Volume
    default: true
    description: すべての NVMe を 1 つの logical volume としてマウントします
    visible:
      and:
      - ${use_advanced}
      - ${localdisk}
  redundancy:
    type: boolean
    title: 冗長性
    default: true
    description: 冗長性のために RAID を使用します
    visible:
      and:
      - ${use_advanced}
      - ${localdisk}
      - ${log_vol}
  nfs_target_path:
    type: string
    title: NFS Path
    default: /share
    description: ドライブをマウントできるパスの値
    visible:
      and:
      - ${add_nfs}
    required: true
  nfs_source_IP:
    type: string
    title: NFS server IP
    default: 0.0.0.0
    required: true
    description: NFS server の IP アドレス
    visible:
      and:
      - ${add_nfs}
      - not:
        - ${create_fss}
  nfs_source_path:
    type: string
    title: NFS server Path
    default: /share
    description: NFS server 上のパスの値
    visible: ${add_nfs}
    required: true
  nfs_options:
    type: string
    title: オプション
    default: ''
    description: マウントオプション。FSS では空文字列が必要です
    visible:
      and:
      - ${add_nfs}
      - not:
        - ${create_fss}
  monitoring_shape_name:
    type: string
    title: MySQL Shape Name
    default: MySQL.VM.Standard.E3.1.16GB
    required: true
    description: MySQL Shape Name
    visible:
      and:
      - ${autoscaling_mysql_service}
  admin_username:
    type: string
    title: MySQL Monitoring ユーザー名
    default: admin
    required: true
    description: ''
    visible:
      and:
      - ${autoscaling_mysql_service}
  admin_password:
    title: MySQL Monitoring パスワード
    default: Monitor1234!
    description: ''
    visible:
      and:
      - ${autoscaling_mysql_service}
    required: true
  autoscaling_monitoring:
    type: boolean
    title: autoscaling を監視
    default: false
    description: ''
    visible:
      and:
      - ${autoscaling}
  autoscaling_mysql_service:
    type: boolean
    title: MySQL Service を作成
    default: false
    description: false の場合は controller を MySQL DB として使用します
    visible:
      and:
      - ${autoscaling}
      - ${autoscaling_monitoring}
  privilege_sudo:
    type: boolean
    title: sudo access
    default: true
    description: privilege group に sudo access を付与します
  privilege_group_name:
    type: string
    title: privilege を持つ group 名
    default: privilege
    required: true
    visible:
      and:
      - ${privilege_sudo}
  login_node:
    type: boolean
    title: Login Node
    default: false
    description: ユーザー用の追加 Login Node を作成します
  login_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${targetCompartment}
    visible: ${login_node}
    required: true
    description: Login Node の Availability Domain
    title: Login Node の Availability Domain
    default: ${ad}
  login_shape:
    title: Login Node Shape
    type: oci:core:instanceshape:name
    dependsOn:
      compartmentId: ${targetCompartment}
    required: true
    default: VM.Standard.E4.Flex
    visible: ${login_node}
  login_ocpus:
    title: コア数
    type: integer
    description: Flex Shape の OCPU 数
    minimum: 1
    maximum: 64
    default: 16
    visible:
      and:
      - or:
        - eq:
          - ${login_shape}
          - VM.Standard.E3.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.E4.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.E5.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.E6.Flex
        - eq:
          - ${login_shape}
          - VM.Optimized3.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.A1.Flex
        - eq:
          - ${login_shape}
          - VM.Standard3.Flex
      - ${login_node}
    required: true
  login_ocpus_denseIO_flex:
    title: コア数
    type: enum
    description: Dense IO Flex Shape の OCPU 数
    enum:
    - 8
    - 16
    - 32
    default: 8
    visible:
      and:
      - or:
        - eq:
          - ${login_shape}
          - VM.DenseIO.E4.Flex
        - eq:
          - ${login_shape}
          - VM.DenseIO.E5.Flex
      - ${login_node}
    required: true
  login_custom_memory:
    title: カスタムメモリサイズを使用
    type: boolean
    default: false
    visible:
      and:
      - or:
        - eq:
          - ${login_shape}
          - VM.Standard.E3.Flex
        - eq:
          - ${login_shape}
          - VM.Optimized3.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.E4.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.E5.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.E6.Flex
        - eq:
          - ${login_shape}
          - VM.Standard.A1.Flex
        - eq:
          - ${login_shape}
          - VM.Standard3.Flex
      - ${login_node}
  login_memory:
    title: メモリサイズ (GB)
    type: integer
    description: Flex Shape のメモリサイズ。コアあたり最低 1GB。
    minimum: 1
    maximum: 1024
    default: 128
    visible:
      and:
      - and:
        - or:
          - eq:
            - ${login_shape}
            - VM.Standard.E3.Flex
          - eq:
            - ${login_shape}
            - VM.Optimized3.Flex
          - eq:
            - ${login_shape}
            - VM.Standard.E4.Flex
          - eq:
            - ${login_shape}
            - VM.Standard.E5.Flex
          - eq:
            - ${login_shape}
            - VM.Standard.E6.Flex
          - eq:
            - ${login_shape}
            - VM.Standard.A1.Flex
          - eq:
            - ${login_shape}
            - VM.Standard3.Flex
      - and:
        - ${login_custom_memory}
        - ${login_node}
    required: true
  login_boot_volume_size:
    type: integer
    required: true
    minimum: 50
    title: Boot Volume サイズ (GB)
    default: 250
    visible: ${login_node}
  login_block:
    type: boolean
    title: Login Node 用の追加 Block Volume
    default: false
    visible: ${login_node}
  login_block_volume_size:
    required: true
    type: integer
    title: 追加 Volume サイズ (GB)
    default: 1000
    visible:
      and:
      - and:
        - ${login_block}
        - ${login_node}
  login_block_volume_performance:
    type: enum
    title: Block Volume パフォーマンス
    required: true
    enum:
    - 0.  Lower performance
    - 10. Balanced performance
    - 20. High Performance
    default: 20. High Performance
    visible:
      and:
      - and:
        - ${login_block}
        - ${login_node}
  unsupported_login:
    title: サポート対象外 Image を使用
    description: Login Node の Custom Image ID
    type: boolean
    default: false
    visible:
      and:
      - ${login_node}
      - not:
        - ${use_marketplace_image_login}
  login_image_compartment:
    title: Login Node Image コンパートメント
    type: oci:identity:compartment:id
    default: ${targetCompartment}
    visible:
      and:
      - ${login_node}
      - not:
        - ${unsupported_login}
      - not:
        - ${use_marketplace_image_login}
    required: true
  custom_login_image:
    title: Login Node Image ID
    description: 'Login Node の Custom Image ID。現時点では login Image として Oracle Linux と Ubuntu 20.04 のみがサポートされています。'
    type: oci:core:image:id
    dependsOn:
      compartmentId: ${login_image_compartment}
    visible:
      and:
      - ${login_node}
      - not:
        - ${unsupported_login}
      - not:
        - ${use_marketplace_image_login}
    required: true
  unsupported_login_image:
    title: Image OCID
    description: Login Node の Custom Image ID
    type: string
    required: true
    visible:
      and:
      - ${unsupported_login}
      - not:
        - ${use_marketplace_image_login}
    default: image.ocid
  login_username:
    title: Login Node のデフォルトユーザー名
    description: Login Node の Custom Image ID
    type: string
    default: opc
    required: true
    visible: ${login_node}
  use_marketplace_image_login:
    type: boolean
    title: Marketplace Image を使用
    description: Marketplace Image を使用します。使用しない場合は Custom Image OCID を指定します
    default: true
    visible: ${login_node}
  marketplace_listing_login:
    type: enum
    title: Image バージョン
    description: 使用する Marketplace リスティング
    required: true
    enum:
    - HPC_OL7
    - HPC_OL8
    - GPU_OL8_NV550
    - GPU_OL7_NV550
    - GPU_OL8_NV535
    - GPU_OL7_NV535
    default: HPC_OL8
    visible:
      and:
      - ${use_marketplace_image_login}
      - ${login_node}
  compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    visible: false
  tenancy_ocid:
    type: string
    required: true
    visible: false
  region:
    type: oci:identity:region:name
    required: true
    visible: false
  cluster_nfs_mount:
    type: string
    required: false
    visible: false
    default: ''
  cluster_nfs_export:
    type: string
    required: false
    visible: false
    default: ''
  scratch_nfs_export:
    type: string
    required: false
    visible: false
    default: ''
  scratch_nfs_mount:
    type: string
    required: false
    visible: false
    default: ''
  marketplace_listing_id:
    type: string
    required: false
    visible: false
    default: ''
  marketplace_listing_id_GPU:
    type: string
    required: false
    visible: false
    default: ''
  marketplace_listing_id_HPC:
    type: string
    required: false
    visible: false
    default: ''
  marketplace_source_images:
    type: string
    required: false
    visible: false
    default: ''
  marketplace_version_id:
    type: string
    required: false
    visible: false
    default: ''
  controller_boot_volume_backup_period:
    type: string
    required: false
    visible: false
    default: ''
  controller_boot_volume_backup_retention_seconds:
    type: string
    required: false
    visible: false
    default: ''
  controller_boot_volume_backup_time_zone:
    type: string
    required: false
    visible: false
    default: ''
  controller_boot_volume_backup_type:
    type: string
    required: false
    visible: false
    default: ''
