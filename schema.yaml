  targetCompartment:
    title: ターゲットコンパートメント
    type: oci:identity:compartment:id
    default: ${compartment_ocid}
    required: true
  use_multiple_ads:
    type: boolean
    title: 複数ADを利用
    description: 容量制約に備えて複数 AD を使用します（Autoscaling のみ）。失敗時には Autoscaling が別の AD を試行します。
    default: false
  ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${targetCompartment}
    required: true
    description: Availability Domain
    title: Availability Domain
  secondary_ad:
    type: oci:identity:availabilitydomain:name
    visible: ${use_multiple_ads}
    dependsOn:
      compartmentId: ${targetCompartment}
    required: false
    description: 2 番目の Availability Domain
    title: 2 番目の Availability Domain
  third_ad:
    type: oci:identity:availabilitydomain:name
    visible: ${use_multiple_ads}
    dependsOn:
      compartmentId: ${targetCompartment}
    required: false
    description: 3 番目の Availability Domain
    title: 3 番目の Availability Domain
  ssh_key:
    type: oci:core:ssh:publickey
    title: 公開 SSH キー
    description: 公開 SSH キー
    required: true
  create_iam_policy_dynamic_group:
    type: boolean
    title: Autoscaling 用 IAM Policy / Dynamic Group を作成
    description: チェックを外すと、このスタックでは Autoscaling 用の Policy と Dynamic Group を作成しません。既存の IAM 設定を利用する場合に無効化します。
    default: true
  use_custom_name:
    type: boolean
    title: クラスタ名の接頭辞(Prefix)を指定
    description: クラスタにカスタム名を指定します
    default: true
  ldap:
    type: boolean
    title: controller から LDAP 認証を構成
    description: 選択すると、node は LDAP 認証を使用するように構成されます。ユーザーとグループの管理はクラスタコマンドで実行できます。
    default: true
  cluster_name:
    title: クラスタ接頭辞(Prefix)
    description: クラスタ接頭辞
    default: ''
    type: string
    visible:
      and:
      - ${use_custom_name}
    required: true
  controller_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${targetCompartment}
    visible:
      eq:
      - ${ui_mode}
      - ADVANCED
    required: true
    description: controller ホストの Availability Domain
    title: Availability Domain
    default: ${ad}
  controller_shape:
    title: controller Shape
    type: oci:core:instanceshape:name
    dependsOn:
      compartmentId: ${targetCompartment}
    required: true
    default: VM.Standard.E5.Flex
  controller_ocpus:
    title: コア数
    type: integer
    description: Flex Shape の OCPU 数
    minimum: 1
    maximum: 64
    default: 4
    visible:
      and:
      - or:
        - eq:
          - ${controller_shape}
          - VM.Standard.E3.Flex
        - eq:
          - ${controller_shape}
          - VM.Standard.E4.Flex
        - eq:
          - ${controller_shape}
          - VM.Standard.E5.Flex
        - eq:
          - ${controller_shape}
          - VM.Standard.E6.Flex
        - eq:
          - ${controller_shape}
